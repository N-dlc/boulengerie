<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boulengerie</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Boulengerie</h1>

<div id="main-buttons">
  <button class="btn" onclick="showCategory('boulangerie')">Boulangerie</button>
  <button class="btn" onclick="showCategory('patisserie')">Pâtisserie</button>
  <button class="btn" onclick="showCategory('boisson')">Boisson</button>
</div>

<div id="products-container" class="products"></div>

<div id="reservation-form">
  <h3>Réserver ce produit</h3>
  <input type="date" id="reservation-date" required>
  <select id="reservation-time" required>
    <option value="">Choisir une tranche horaire</option>
    <option value="9h-12h">9h-12h</option>
    <option value="12h-15h">12h-15h</option>
    <option value="15h-18h">15h-18h</option>
  </select>
  <button onclick="submitReservation()">Envoyer</button>
</div>

<script src="script.js"></script>

</body>
</html>
